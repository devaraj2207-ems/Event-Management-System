<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EMS - Event Management System</title>
<!-- BEGIN: External Resources -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- END: External Resources -->
<style data-purpose="typography">
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
        }
        h1, h2, h3 {
            color: #1e293b;
        }
        .card-label {
            color: #94a3b8;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.075em;
        }
        .card-value {
            color: #64748b;
            font-size: 0.85rem;
            font-weight: 400;
            margin-top: 0.25rem;
        }
        .nav-link {
            transition: color 0.2s;
        }
        .btn-shadow {
            box-shadow: 0 4px 14px 0 rgba(11, 91, 228, 0.39);
        }
    </style>
</head>
<body class="min-h-screen pb-20">
<!-- BEGIN: MainHeader -->
<header class="bg-white px-8 py-6 flex items-center justify-between">
<div class="flex items-center">
<span class="text-xl font-bold tracking-tight text-gray-900">EMS</span>
</div>
<nav class="flex items-center space-x-12">
<a class="nav-link text-sm font-medium text-gray-600 hover:text-gray-900" href="events.html">Events</a>
<a class="nav-link text-sm font-medium text-gray-400 hover:text-gray-900" href="dashboard.html">MyEvents</a>
</nav>
<div>
<a class="nav-link text-sm font-medium text-gray-400 hover:text-gray-900 tracking-widest uppercase" href="/logout">LOGOUT</a>
</div>
</header>
<!-- END: MainHeader -->
<div id="pageMessage" class="max-w-7xl mx-auto px-8 pt-8 hidden"></div>
<main class="max-w-7xl mx-auto px-8 pt-8">
<!-- BEGIN: Individual Events Section -->
<section class="mb-16" id="individual-events">
<h2 class="text-2xl font-bold mb-10">Individual Events</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-10" id="individual-events-container">
<!-- Events will be loaded here by JavaScript -->
</div>
</section>
<!-- END: Individual Events Section -->
<!-- BEGIN: Group Events Section -->
<section id="group-events">
<h2 class="text-2xl font-bold mb-10">Group Events</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-10" id="group-events-container">
<!-- Events will be loaded here by JavaScript -->
</div>
</section>
<!-- END: Group Events Section -->
</main>
<script>
  function showPageMessage() {
    const params = new URLSearchParams(window.location.search);
    const error = params.get('error');
    const success = params.get('success');
    const container = document.getElementById('pageMessage');
    if (!container) return;
    if (error) {
      container.textContent = '• ' + decodeURIComponent(error).replace(/\+/g, ' ');
      container.className = 'max-w-7xl mx-auto px-8 pt-8 mb-6 p-4 rounded-lg bg-red-50 border border-red-200 text-sm text-red-700';
      container.classList.remove('hidden');
    } else if (success) {
      container.textContent = decodeURIComponent(success).replace(/\+/g, ' ');
      container.className = 'max-w-7xl mx-auto px-8 pt-8 mb-6 p-4 rounded-lg bg-green-50 border border-green-200 text-sm text-green-700';
      container.classList.remove('hidden');
    }
  }

  async function loadEvents() {
    try {
      const response = await fetch('/api/events');
      if (!response.ok) {
        throw new Error('Unable to load events from backend');
      }
      const events = await response.json();

      // Fetch user's registered events
      const regResponse = await fetch('/api/user-registrations');
      let registeredEventIds = [];
      if (regResponse.ok) {
        const regData = await regResponse.json();
        registeredEventIds = regData.eventIds || [];
      }

      const individualContainer = document.getElementById('individual-events-container');
      const groupContainer = document.getElementById('group-events-container');

      individualContainer.innerHTML = '';
      groupContainer.innerHTML = '';

      events.forEach(event => {
        const card = document.createElement('article');
        card.className = 'bg-[#f4f7f9] rounded-3xl p-12 flex flex-col justify-between min-h-[480px]';

        const availableSlots = (event.capacity || 0) - (event.registeredCount || 0);
        const isIndividual = event.type && event.type.toLowerCase() === 'individual';
        const isRegistered = registeredEventIds.includes(event.id);
        const isExpired = event.status === 'Expired';

        let buttonHTML;
        if (isExpired) {
          buttonHTML = `<button disabled class="bg-gray-400 text-white font-semibold py-3.5 px-12 rounded-lg w-fit text-sm cursor-not-allowed opacity-75">Expired</button>`;
        } else if (isRegistered) {
          buttonHTML = `<div class="bg-green-500 text-white font-semibold py-3.5 px-12 rounded-lg w-fit text-sm cursor-not-allowed">Registered</div>`;
        } else if (availableSlots <= 0) {
          buttonHTML = `<div class="bg-red-400 text-white font-semibold py-3.5 px-12 rounded-lg w-fit text-sm cursor-not-allowed opacity-75">Event Full</div>`;
        } else {
          buttonHTML = `<a href="${isIndividual ? 'event-registration-individual.html' : 'event-registration-group.html'}?eventId=${event.id}" class="bg-[#0b5be4] hover:bg-blue-700 text-white font-semibold py-3.5 px-12 rounded-lg w-fit btn-shadow transition-all text-sm inline-block">${isIndividual ? 'Register' : 'Register Team'}</a>`;
        }

        card.innerHTML = `
          <div>
            <h3 class="text-[22px] font-bold uppercase mb-6 tracking-wide">${event.name}</h3>
            <p class="text-gray-500 text-[15px] leading-relaxed mb-12 max-w-sm">${event.description || 'Event description not available'}</p>
            <div class="grid grid-cols-2 gap-y-10 mb-12">
              <div>
                <p class="card-label">ORGANIZER</p>
                <p class="card-value">${event.organizer}</p>
              </div>
              <div>
                <p class="card-label">DATE</p>
                <p class="card-value">${event.eventDate}</p>
              </div>
              <div>
                <p class="card-label">VENUE</p>
                <p class="card-value">${event.venue}</p>
              </div>
              ${isIndividual ? '' : `<div>\n                <p class="card-label">PARTICIPANT PER TEAM</p>\n                <p class="card-value">${event.teamSize > 0 ? event.teamSize : 'Not set'}</p>\n              </div>`}
              <div>
                <p class="card-label">AVAILABLE ${isIndividual ? 'SLOTS' : 'TEAM SLOTS'}</p>
                <p class="card-value">${availableSlots > 0 ? availableSlots : 0}</p>
              </div>
            </div>
          </div>
          ${buttonHTML}
        `;

        if (isIndividual) {
          individualContainer.appendChild(card);
        } else {
          groupContainer.appendChild(card);
        }
      });

      if (individualContainer.children.length === 0) {
        individualContainer.innerHTML = '<p class="text-gray-500">No individual events available</p>';
      }
      if (groupContainer.children.length === 0) {
        groupContainer.innerHTML = '<p class="text-gray-500">No group events available</p>';
      }
    } catch (error) {
      console.error('Error loading events:', error);
      document.getElementById('individual-events-container').innerHTML = '<p class="text-gray-500">Unable to load individual events.</p>';
      document.getElementById('group-events-container').innerHTML = '<p class="text-gray-500">Unable to load group events.</p>';
    }
  }

  window.addEventListener('load', () => {
    showPageMessage();
    loadEvents();
  });
</script>
</body></html>
