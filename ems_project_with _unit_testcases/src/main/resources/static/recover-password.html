<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Reset Password - EMS</title>
<!-- Tailwind CSS v3 with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Font Import: Plus Jakarta Sans (Matches the minimalist aesthetic) -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'sans-serif'],
          },
          colors: {
            brandBlue: '#0056D2', // Matches the vibrant blue button in the image
          },
        },
      },
    }
  </script>
<style data-purpose="custom-layout">
    body {
      background-color: #F8F9FA; /* Off-white background from image */
    }
    .forgot-password-card {
      box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.05);
    }
    
    /* Hide native browser password reveal button and autofill decorations */
    input[type="password"] {
      font-size: 16px;
    }
    input[type="password"]::-webkit-credentials-auto-fill-button,
    input[type="password"]::-webkit-autofill-button {
      display: none !important;
      visibility: hidden;
      pointer-events: none;
    }
    input[type="password"]::-webkit-outer-spin-button,
    input[type="password"]::-webkit-inner-spin-button {
      display: none !important;
    }
    input[type="password"]::placeholder {
      opacity: 0.7;
    }
  </style>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/></head>
<body class="antialiased">
<!-- BEGIN: MainHeader -->
<header class="border-b border-gray-100 p-8">
<div class="max-w-7xl mx-auto">
<h1 class="text-xl font-bold text-slate-800">EMS</h1>
</div>
</header>
<!-- END: MainHeader -->
<!-- BEGIN: ResetPasswordContainer -->
<main class="flex flex-col items-center justify-center min-h-[70vh] px-4">
<!-- BEGIN: ResetPasswordCard -->
<section class="bg-white w-full max-w-[450px] p-10 md:p-14 forgot-password-card rounded-sm" data-purpose="reset-password-card">
<div class="space-y-8">
<!-- Header Section -->
<div class="text-center md:text-left">
<h2 class="text-3xl font-bold text-slate-900">Reset Password</h2>
</div>
<!-- Form Section -->
<form action="/reset-password" class="space-y-6" method="POST">
<!-- Error Message -->
<div id="errorMessage" class="mb-6 p-4 rounded-lg bg-red-50 border border-red-200 text-sm text-red-700 hidden"></div>
<!-- Email Address Field -->
<div class="space-y-2">
<label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider" for="email">
              Email Address
            </label>
<input class="w-full border border-gray-300 rounded-none h-12 pr-10 focus:ring-brandBlue focus:border-brandBlue text-sm" id="email" name="email" required="" type="email" pattern="^[a-z0-9._%+-]+@gmail\.com$" title="Email must be lowercase and use @gmail.com."/>
</div>
<!-- New Password Field -->
<div class="space-y-2">
<label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider" for="new_password">
              New Password
            </label>
<div class="relative flex items-center">
<input class="w-full border border-gray-300 rounded-none h-12 pr-10 focus:ring-brandBlue focus:border-brandBlue text-sm" id="new_password" name="new_password" required="" minlength="8" maxlength="16" autocomplete="new-password" type="password" pattern="^[^\s,]+$" title="Password cannot contain spaces or commas."/>
<button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-700" onclick="togglePassword('new_password','toggleNewPasswordIcon')" aria-label="Toggle password visibility">
<span class="material-symbols-outlined" id="toggleNewPasswordIcon">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password Field -->
<div class="space-y-2">
<label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider" for="confirm_password">
              Confirm Password
            </label>
<div class="relative flex items-center">
<input class="w-full border border-gray-300 rounded-none h-12 pr-10 focus:ring-brandBlue focus:border-brandBlue text-sm" id="confirm_password" name="confirm_password" required="" minlength="8" maxlength="16" autocomplete="new-password" type="password" pattern="^[^\s,]+$" title="Password cannot contain spaces or commas."/>
<button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-700" onclick="togglePassword('confirm_password','toggleConfirmPasswordIcon')" aria-label="Toggle password visibility">
<span class="material-symbols-outlined" id="toggleConfirmPasswordIcon">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<div class="pt-2">
<button class="w-full bg-brandBlue hover:bg-blue-700 text-white font-bold py-4 rounded-sm transition-colors duration-200 tracking-wide text-sm" type="submit">
              SUBMIT
            </button>
</div>
</form>
<!-- Back to Login Link -->
<div class="mt-8 text-center">
<p class="text-xs text-gray-500">
          Remember your password? <a class="text-brandBlue font-bold hover:underline" href="index.html">Back to Login</a>
</p>
</div>
</div>
</section>
<!-- END: ResetPasswordCard -->
</main>
<!-- END: ResetPasswordContainer -->
<script>
// Display error or success messages from query parameters
  window.addEventListener('load', function() {
    const urlParams = new URLSearchParams(window.location.search);
    const errorMessage = urlParams.get('error');
    const successMessage = urlParams.get('success');
    const errorDiv = document.getElementById('errorMessage');
    
    if (errorMessage) {
      errorDiv.innerHTML = '• ' + decodeURIComponent(errorMessage).replace(/\\+/g, ' ');
      errorDiv.classList.remove('hidden');
    } else if (successMessage) {
      errorDiv.innerHTML = decodeURIComponent(successMessage).replace(/\\+/g, ' ');
      errorDiv.classList.remove('hidden');
      errorDiv.classList.remove('bg-red-50', 'border-red-200', 'text-red-700');
      errorDiv.classList.add('bg-green-50', 'border-green-200', 'text-green-700');
    }
  });

  function togglePassword(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    if (!input || !icon) return;
    if (input.type === 'password') {
      input.type = 'text';
      icon.textContent = 'visibility_off';
    } else {
      input.type = 'password';
      icon.textContent = 'visibility';
    }
  }

  document.querySelector('form').addEventListener('submit', function(event) {
    const email = document.getElementById('email').value.trim();
    const newPassword = document.getElementById('new_password').value;
    const confirmPassword = document.getElementById('confirm_password').value;
    const errorDiv = document.getElementById('errorMessage');

    if (!email) {
      event.preventDefault();
      errorDiv.innerHTML = '• Email is required.';
      errorDiv.classList.remove('hidden');
      return;
    }
    if (/[A-Z]/.test(email)) {
      event.preventDefault();
      errorDiv.innerHTML = '• Email must contain only lowercase letters.';
      errorDiv.classList.remove('hidden');
      return;
    }
    if (!/^[a-z0-9._%+-]+@gmail\.com$/.test(email)) {
      event.preventDefault();
      errorDiv.innerHTML = '• Email must use the @gmail.com domain.';
      errorDiv.classList.remove('hidden');
      return;
    }
    if (email.length > 40) {
      event.preventDefault();
      errorDiv.innerHTML = '• Email must not exceed 40 characters.';
      errorDiv.classList.remove('hidden');
      return;
    }

    if (newPassword !== confirmPassword) {
      event.preventDefault();
      errorDiv.innerHTML = '• Passwords do not match. Please verify and try again.';
      errorDiv.classList.remove('hidden');
      return;
    }
    if (/\s|,/.test(newPassword) || /\s|,/.test(confirmPassword)) {
      event.preventDefault();
      errorDiv.innerHTML = '• Password cannot contain spaces or commas.';
      errorDiv.classList.remove('hidden');
      return;
    }
  });
</script>
</body></html>
